<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 1200px;
  height: 630px;
  overflow: hidden;
  background: #F4F2EE;
  font-family: 'Inter', sans-serif;
  -webkit-font-smoothing: antialiased;
  color: #1F1F1F;
}

.og {
  width: 1200px;
  height: 630px;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* Subtle background textures or lines typical of Claude aesthetic */
.bg-grad {
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 0%, #FFFFFF 0%, transparent 70%);
  opacity: 0.6;
}

.frame {
  position: absolute; inset: 32px;
  border: 1px solid #E5E3DB;
  border-radius: 24px; pointer-events: none;
  background: rgba(255, 255, 255, 0.3);
  box-shadow: 0 12px 48px rgba(0,0,0,0.02);
}

.content {
  position: relative; z-index: 10;
  display: flex; flex-direction: column; align-items: center; text-align: center;
  padding: 0 80px;
}

.brand-icon {
  width: 64px; height: 64px; border-radius: 16px;
  background: #D46B4E;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Serif', serif; font-size: 36px; font-weight: 600;
  color: #F4F2EE; margin-bottom: 24px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.08);
}

.brand {
  font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 600;
  letter-spacing: 0.2em; color: #605F5C; text-transform: uppercase;
  margin-bottom: 24px;
}

.title {
  font-family: 'Noto Serif', serif; font-size: 64px; font-weight: 600;
  color: #1A1A1A; line-height: 1.2; letter-spacing: -0.02em; margin-bottom: 12px;
}

.jp {
  font-family: 'Inter', sans-serif; font-size: 18px; font-weight: 500;
  color: #8A8883; letter-spacing: 0.1em; margin-bottom: 32px;
}

.desc {
  font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 400;
  color: #605F5C; line-height: 1.6; max-width: 720px; margin-bottom: 40px;
}

.tags { display: flex; gap: 16px; align-items: center; }
.tag {
  padding: 10px 24px; border-radius: 100px; font-family: 'Inter', sans-serif;
  font-size: 15px; font-weight: 500; letter-spacing: 0.02em;
  background: #FFFFFF; border: 1px solid #E5E3DB; color: #1F1F1F;
  box-shadow: 0 2px 8px rgba(0,0,0,0.02);
}
.tag-accent {
  background: #D46B4E; border: 1px solid #D46B4E; color: #FFFFFF; font-weight: 600;
}

.bottom-bar {
  position: absolute; bottom: 48px; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 8px; z-index: 10;
}
.bottom-url {
  font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 500;
  color: #8A8883; letter-spacing: 0.04em;
}
</style>
</head>
<body>
<div class="og">
  <div class="bg-grad"></div>
  <div class="frame"></div>

  <div class="content">
    <div class="brand-icon">N</div>
    <div class="brand">Nippon Tokutei</div>
    <h1 class="title">
      Việc Làm Tokutei & Kỹ Sư<br>
      Miễn Phí Tại Nhật Bản
    </h1>
    <p class="jp">特定技能 · 技術ビザ — 完全無料サポート</p>
    <p class="desc">
      Hỗ trợ chuyển việc & chuyển visa cho Tokutei và Kỹ sư đang tại Nhật Bản — hoàn toàn không mất phí.
    </p>
    <div class="tags">
      <span class="tag">Tokutei · 特定技能</span>
      <span class="tag">Kỹ Sư · 技術</span>
      <span class="tag tag-accent">Miễn Phí 100%</span>
    </div>
  </div>

  <div class="bottom-bar">
    <span class="bottom-url">nippontokutei.com</span>
  </div>
</div>
</body>
</html>
